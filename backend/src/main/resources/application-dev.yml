spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cvmaker}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:admin}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    schemas: cv
    default-schema: cv
    locations: classpath:db/migration

logging:
  level:
    com.cvmaker: DEBUG
    org.flywaydb: INFO
