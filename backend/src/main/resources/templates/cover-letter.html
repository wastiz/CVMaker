<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        @page { size: A4; margin: 25mm; }
        body { margin: 0; color: #222; line-height: 1.6; }
        .content { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body th:style="|font-family: '${fontFamily}', 'Times New Roman', serif; font-size: ${fontSize}pt;|">
    <div class="content" th:text="${content}"></div>
</body>
</html>
