<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        @page { size: A4; margin: 0 }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 10.5pt; color: #333; margin: 20mm 18mm; line-height: 1.5; }
        h1 { font-size: 22pt; font-weight: 300; letter-spacing: 2px; margin: 0 0 1mm; color: #111; }
        h2 { font-size: 9pt; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #888; margin: 7mm 0 3mm; border: none; }
        h3 { font-size: 11pt; font-weight: 600; margin: 0; color: #111; }
        .contact { font-size: 9pt; color: #888; margin-bottom: 7mm; line-height: 1.8; }
        .contact a { color: #888; }
        .contact-item { white-space: nowrap; }
        .contact-item svg { vertical-align: middle; margin-right: 2pt; }
        .entry { margin-bottom: 4mm; }
        .meta { font-size: 9pt; color: #aaa; margin: 0; }
        p { margin: 1mm 0 0; }
        ul { margin: 1mm 0 0 4mm; padding: 0; }
        li { margin-bottom: 0.5mm; }
        .tags { margin-top: 1mm; font-size: 9pt; color: #aaa; }
        .skills-grid { font-size: 10pt; }
        .skills-grid td { padding: 0 4mm 1mm 0; vertical-align: top; }
    </style>
    <link rel="stylesheet" th:href="${fontImportUrl}"/>
</head>
<body th:style="|font-family: ${fontCssStack}; font-size: ${fontSizePt}pt;|">
    <h1 th:text="${cv.firstName} + ' ' + ${cv.lastName}">Full Name</h1>
    <div class="contact">
        <span th:if="${cv.email}" class="contact-item"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:2pt"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7-10-7"/></svg><span th:text="${cv.email}"></span></span>
        <span th:if="${cv.phone}">  ·  <span class="contact-item"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:2pt"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 014.73 12 19.79 19.79 0 011.66 3.34 2 2 0 013.68 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg><span th:text="${cv.phone}"></span></span></span>
        <span th:if="${cv.location}">  ·  <span class="contact-item"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:2pt"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg><span th:text="${cv.location}"></span></span></span>
        <span th:if="${cv.github}">  ·  <span class="contact-item"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:2pt"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg><a th:href="${cv.github}" th:text="${cv.github}"></a></span></span>
        <span th:if="${cv.linkedin}">  ·  <span class="contact-item"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:2pt"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg><a th:href="${cv.linkedin}" th:text="${cv.linkedin}"></a></span></span>
        <span th:if="${cv.portfolio}">  ·  <span class="contact-item"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:2pt"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg><a th:href="${cv.portfolio}" th:text="${cv.portfolio}"></a></span></span>
        <span th:if="${cv.otherLink}">  ·  <span class="contact-item"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:2pt"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg><a th:href="${cv.otherLink}" th:text="${cv.otherLink}"></a></span></span>
        <span th:if="${cv.driverLicense}">  ·  <span class="contact-item"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:2pt"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg><span th:text="${cv.driverLicense}"></span></span></span>
    </div>

    <div th:if="${cv.summary}">
        <h2 th:text="${labels.summary}">About</h2>
        <p th:text="${cv.summary}"></p>
    </div>

    <th:block th:each="section : ${sectionOrder}">

        <div th:if="${section == 'experience' and not #lists.isEmpty(cv.experiences)}">
            <h2 th:text="${labels.experience}">Experience</h2>
            <div class="entry" th:each="exp : ${cv.experiences}">
                <h3 th:text="${exp.position} + '  —  ' + ${exp.company}"></h3>
                <p class="meta" th:text="${exp.startDate} + ' – ' + (${exp.isCurrent} ? 'Present' : ${exp.endDate}) + (${exp.location} ? '  ·  ' + ${exp.location} : '')"></p>
                <p th:if="${exp.description}" th:text="${exp.description}"></p>
                <div class="tags" th:if="${not #lists.isEmpty(exp.stack)}" th:text="${#strings.listJoin(exp.stack, '  ·  ')}"></div>
            </div>
        </div>

        <div th:if="${section == 'projects' and not #lists.isEmpty(cv.projects)}">
            <h2 th:text="${labels.projects}">Projects</h2>
            <div class="entry" th:each="proj : ${cv.projects}">
                <h3 th:text="${proj.name}"></h3>
                <p th:if="${proj.description}" th:text="${proj.description}"></p>
                <ul th:if="${not #lists.isEmpty(proj.bulletPoints)}">
                    <li th:each="bp : ${proj.bulletPoints}" th:text="${bp}"></li>
                </ul>
                <div class="tags" th:if="${not #lists.isEmpty(proj.stack)}" th:text="${#strings.listJoin(proj.stack, '  ·  ')}"></div>
            </div>
        </div>

        <div th:if="${section == 'education' and not #lists.isEmpty(cv.educations)}">
            <h2 th:text="${labels.education}">Education</h2>
            <div class="entry" th:each="edu : ${cv.educations}">
                <h3 th:text="${edu.institution}"></h3>
                <p class="meta" th:if="${edu.degree}" th:text="${edu.degree} + (${edu.fieldOfStudy} ? ', ' + ${edu.fieldOfStudy} : '') + '  ·  ' + ${edu.startDate} + ' – ' + (${edu.isCurrent} ? 'Present' : ${edu.endDate})"></p>
            </div>
        </div>

        <div th:if="${section == 'skills' and not #lists.isEmpty(cv.skills)}">
            <h2 th:text="${labels.skills}">Skills</h2>
            <table class="skills-grid" th:if="${!skillsByType.isEmpty()}">
                <tr th:each="entry : ${skillsByType}">
                    <td style="font-weight:bold; width:25mm;" th:text="${entry.key}"></td>
                    <td th:text="${#strings.listJoin(entry.value, ', ')}"></td>
                </tr>
            </table>
            <p th:if="${!skillsFlat.isEmpty()}" th:text="${#strings.listJoin(skillsFlat, '  ·  ')}"></p>
        </div>

        <div th:if="${section == 'languages' and not #lists.isEmpty(cv.languages)}">
            <h2 th:text="${labels.languages}">Languages</h2>
            <p th:text="${#strings.listJoin(cv.languages.![language + (level != null ? ' (' + level + ')' : '')], '  ·  ')}"></p>
        </div>

        <div th:if="${section == 'certificates' and not #lists.isEmpty(cv.certificates)}">
            <h2 th:text="${labels.certificates}">Certificates</h2>
            <div class="entry" th:each="cert : ${cv.certificates}">
                <h3 th:text="${cert.name}"></h3>
                <p class="meta" th:if="${cert.issuer}" th:text="${cert.issuer} + (${cert.issueDate} ? '  ·  ' + ${cert.issueDate} : '')"></p>
            </div>
        </div>

    </th:block>
</body>
</html>
