<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        @page { size: A4; margin: 0; }
        body { font-family: Arial, Helvetica, sans-serif; font-size: 10pt; color: #333; margin: 20mm 18mm; }
        table.layout { width: 100%; border-collapse: collapse; }
        td.sidebar { width: 68mm; background: #2c3e50; color: #ecf0f1; vertical-align: top; padding: 12mm 8mm; }
        td.main    { vertical-align: top; padding: 12mm 10mm; }
        .sidebar h1 { font-size: 16pt; color: #fff; margin: 0 0 1mm; font-weight: 700; }
        .sidebar .role { font-size: 10pt; color: #bdc3c7; margin: 0 0 6mm; }
        .sidebar h2 { font-size: 8pt; text-transform: uppercase; letter-spacing: 1.5px; color: #7f8c8d; margin: 5mm 0 2mm; }
        .sidebar p, .sidebar li { font-size: 9pt; color: #bdc3c7; margin: 0 0 1mm; }
        .sidebar a { color: #bdc3c7; word-break: break-all; }
        .sidebar ul { margin: 0; padding-left: 4mm; }
        .sidebar .skill-type { font-size: 8pt; color: #95a5a6; font-weight: bold; margin: 2mm 0 0.5mm; }
        .sidebar .contact-item { display: block; font-size: 9pt; color: #bdc3c7; margin: 0 0 1.5mm; white-space: normal; }
        .sidebar .contact-item svg { vertical-align: middle; margin-right: 3pt; }
        .main h2 { font-size: 10pt; text-transform: uppercase; letter-spacing: 1px; color: #2c3e50; border-bottom: 2px solid #2c3e50; padding-bottom: 1mm; margin: 0 0 3mm; }
        .main h3 { font-size: 10.5pt; margin: 0; font-weight: 700; }
        .entry { margin-bottom: 4mm; }
        .entry-header { display: table; width: 100%; }
        .entry-left  { display: table-cell; }
        .entry-right { display: table-cell; text-align: right; font-size: 9pt; color: #999; white-space: nowrap; }
        .subtitle { font-size: 9pt; color: #777; margin: 0; }
        p { margin: 1mm 0 0; }
        ul.bullets { margin: 1mm 0 0 4mm; padding: 0; }
        li { margin-bottom: 0.5mm; }
        .tags { margin-top: 1mm; font-size: 9pt; color: #999; }
        .section { margin-bottom: 5mm; }
    </style>
    <link rel="stylesheet" th:href="${fontImportUrl}"/>
</head>
<body th:style="|font-family: ${fontCssStack}; font-size: ${fontSizePt}pt;|">
<table class="layout">
<tr>
    <td class="sidebar">
        <h1 th:text="${cv.firstName} + ' ' + ${cv.lastName}">Full Name</h1>

        <div th:if="${cv.email or cv.phone or cv.location or cv.github or cv.linkedin or cv.portfolio or cv.otherLink}">
            <h2>Contact</h2>
            <span th:if="${cv.email}" class="contact-item"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3pt"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7-10-7"/></svg><span th:text="${cv.email}"></span></span>
            <span th:if="${cv.phone}" class="contact-item"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3pt"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 014.73 12 19.79 19.79 0 011.66 3.34 2 2 0 013.68 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg><span th:text="${cv.phone}"></span></span>
            <span th:if="${cv.location}" class="contact-item"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3pt"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg><span th:text="${cv.location}"></span></span>
            <span th:if="${cv.github}" class="contact-item"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3pt"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg><a th:href="${cv.github}" th:text="${cv.github}"></a></span>
            <span th:if="${cv.linkedin}" class="contact-item"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3pt"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg><a th:href="${cv.linkedin}" th:text="${cv.linkedin}"></a></span>
            <span th:if="${cv.portfolio}" class="contact-item"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3pt"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg><a th:href="${cv.portfolio}" th:text="${cv.portfolio}"></a></span>
            <span th:if="${cv.otherLink}" class="contact-item"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3pt"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg><a th:href="${cv.otherLink}" th:text="${cv.otherLink}"></a></span>
        </div>

        <div th:if="${not #lists.isEmpty(cv.skills)}">
            <h2 th:text="${labels.skills}">Skills</h2>
            <div th:if="${!skillsByType.isEmpty()}">
                <div th:each="entry : ${skillsByType}">
                    <p class="skill-type" th:text="${entry.key}"></p>
                    <ul>
                        <li th:each="name : ${entry.value}" th:text="${name}"></li>
                    </ul>
                </div>
            </div>
            <ul th:if="${!skillsFlat.isEmpty()}">
                <li th:each="name : ${skillsFlat}" th:text="${name}"></li>
            </ul>
        </div>

        <div th:if="${not #lists.isEmpty(cv.languages)}">
            <h2 th:text="${labels.languages}">Languages</h2>
            <ul>
                <li th:each="lang : ${cv.languages}" th:text="${lang.language} + (${lang.level} ? ' — ' + ${lang.level} : '')"></li>
            </ul>
        </div>

        <div th:if="${cv.driverLicense}">
            <h2>Driver License</h2>
            <p class="contact-item"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3pt"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg><span th:text="${cv.driverLicense}"></span></p>
        </div>
    </td>

    <td class="main">
        <div class="section" th:if="${cv.summary}">
            <h2 th:text="${labels.summary}">Summary</h2>
            <p th:text="${cv.summary}"></p>
        </div>

        <th:block th:each="section : ${sectionOrder}">

            <div class="section" th:if="${section == 'experience' and not #lists.isEmpty(cv.experiences)}">
                <h2 th:text="${labels.experience}">Experience</h2>
                <div class="entry" th:each="exp : ${cv.experiences}">
                    <div class="entry-header">
                        <div class="entry-left">
                            <h3 th:text="${exp.position}"></h3>
                            <p class="subtitle" th:text="${exp.company} + (${exp.location} ? ', ' + ${exp.location} : '')"></p>
                        </div>
                        <div class="entry-right">
                            <span th:text="${exp.startDate} + ' – ' + (${exp.isCurrent} ? 'Present' : ${exp.endDate})"></span>
                        </div>
                    </div>
                    <p th:if="${exp.description}" th:text="${exp.description}"></p>
                    <div class="tags" th:if="${not #lists.isEmpty(exp.stack)}" th:text="${#strings.listJoin(exp.stack, ' · ')}"></div>
                </div>
            </div>

            <div class="section" th:if="${section == 'projects' and not #lists.isEmpty(cv.projects)}">
                <h2 th:text="${labels.projects}">Projects</h2>
                <div class="entry" th:each="proj : ${cv.projects}">
                    <h3 th:text="${proj.name}"></h3>
                    <p th:if="${proj.description}" th:text="${proj.description}"></p>
                    <ul class="bullets" th:if="${not #lists.isEmpty(proj.bulletPoints)}">
                        <li th:each="bp : ${proj.bulletPoints}" th:text="${bp}"></li>
                    </ul>
                    <div class="tags" th:if="${not #lists.isEmpty(proj.stack)}" th:text="${#strings.listJoin(proj.stack, ' · ')}"></div>
                </div>
            </div>

            <div class="section" th:if="${section == 'education' and not #lists.isEmpty(cv.educations)}">
                <h2 th:text="${labels.education}">Education</h2>
                <div class="entry" th:each="edu : ${cv.educations}">
                    <div class="entry-header">
                        <div class="entry-left">
                            <h3 th:text="${edu.institution}"></h3>
                            <p class="subtitle" th:if="${edu.degree}" th:text="${edu.degree} + (${edu.fieldOfStudy} ? ', ' + ${edu.fieldOfStudy} : '')"></p>
                        </div>
                        <div class="entry-right">
                            <span th:text="${edu.startDate} + ' – ' + (${edu.isCurrent} ? 'Present' : ${edu.endDate})"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="section" th:if="${section == 'certificates' and not #lists.isEmpty(cv.certificates)}">
                <h2 th:text="${labels.certificates}">Certificates</h2>
                <div class="entry" th:each="cert : ${cv.certificates}">
                    <h3 th:text="${cert.name}"></h3>
                    <p class="subtitle" th:if="${cert.issuer}" th:text="${cert.issuer} + (${cert.issueDate} ? ' · ' + ${cert.issueDate} : '')"></p>
                </div>
            </div>

        </th:block>
    </td>
</tr>
</table>
</body>
</html>
